name: Post Tweet Thread

on:
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compose and post thread
        run: |
          TWEET_JSON=$(node scripts/compose-tweet.mjs)

          echo "### Thread Posted" >> "$GITHUB_STEP_SUMMARY"
          echo "$TWEET_JSON" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const thread = d.thread || [d.text];
            thread.forEach((t, i) => {
              console.log('**Tweet ' + (i+1) + '/' + thread.length + '** (' + t.length + ' chars)');
              console.log('');
              console.log('> ' + t.replace(/\n/g, '\n> '));
              console.log('');
            });
          " >> "$GITHUB_STEP_SUMMARY"

          echo "$TWEET_JSON" | node scripts/post-tweet.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
