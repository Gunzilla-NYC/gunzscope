name: Tweet on Update

on:
  push:
    branches: [main]
    paths:
      - 'lib/data/updates.ts'

  # Manual trigger for testing or re-posting
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compose tweet
        id: compose
        run: |
          TWEET_JSON=$(node scripts/compose-tweet.mjs)
          echo "tweet_json=$TWEET_JSON" >> "$GITHUB_OUTPUT"
          TWEET_TEXT=$(echo "$TWEET_JSON" | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).text))")
          echo "### Tweet Preview" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$TWEET_TEXT" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Review the tweet above.** If it looks good, approve the 'post' job to publish it." >> "$GITHUB_STEP_SUMMARY"
    outputs:
      tweet_json: ${{ steps.compose.outputs.tweet_json }}

  post:
    needs: preview
    runs-on: ubuntu-latest
    environment: twitter-approval
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post tweet
        run: echo '${{ needs.preview.outputs.tweet_json }}' | node scripts/post-tweet.mjs
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
