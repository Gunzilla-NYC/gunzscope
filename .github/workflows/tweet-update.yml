name: Tweet on Update

on:
  push:
    branches: [main]
    paths:
      - 'lib/data/updates.ts'

  # Manual trigger for testing or re-posting
  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compose tweet
        id: compose
        run: |
          TWEET_JSON=$(node scripts/compose-tweet.mjs)
          echo "tweet_json=$TWEET_JSON" >> "$GITHUB_OUTPUT"
          echo "### Tweet Preview" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$TWEET_JSON" | node -e "process.stdin.on('data',d=>console.log(JSON.parse(d).text))" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Post tweet
        run: echo '${{ steps.compose.outputs.tweet_json }}' | node scripts/post-tweet.mjs
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
