<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 675px;
    background: #0A0A0A;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card {
    width: 1200px;
    height: 675px;
    background: #0A0A0A;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    /* Corner cuts - tactical HUD style */
    clip-path: polygon(
      0 24px, 24px 0, calc(100% - 24px) 0, 100% 24px,
      100% calc(100% - 24px), calc(100% - 24px) 100%, 24px 100%, 0 calc(100% - 24px)
    );
  }

  /* Scanline overlay */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(166, 247, 0, 0.015) 2px,
      rgba(166, 247, 0, 0.015) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Border glow */
  .border-frame {
    position: absolute;
    inset: 3px;
    clip-path: polygon(
      0 22px, 22px 0, calc(100% - 22px) 0, 100% 22px,
      100% calc(100% - 22px), calc(100% - 22px) 100%, 22px 100%, 0 calc(100% - 22px)
    );
    border: 1px solid rgba(166, 247, 0, 0.15);
    pointer-events: none;
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
    z-index: 5;
  }
  .corner-tl { top: 16px; left: 16px; border-top: 2px solid #A6F700; border-left: 2px solid #A6F700; }
  .corner-tr { top: 16px; right: 16px; border-top: 2px solid #A6F700; border-right: 2px solid #A6F700; }
  .corner-bl { bottom: 16px; left: 16px; border-bottom: 2px solid #A6F700; border-left: 2px solid #A6F700; }
  .corner-br { bottom: 16px; right: 16px; border-bottom: 2px solid #A6F700; border-right: 2px solid #A6F700; }

  /* Grid lines */
  .grid-line {
    position: absolute;
    background: rgba(166, 247, 0, 0.04);
  }
  .grid-h { height: 1px; left: 60px; right: 60px; }
  .grid-v { width: 1px; top: 60px; bottom: 60px; }
  .grid-h1 { top: 33%; }
  .grid-h2 { top: 66%; }
  .grid-v1 { left: 33%; }
  .grid-v2 { left: 66%; }

  .logo {
    width: 120px;
    height: 131px;
    margin-bottom: 40px;
    opacity: 0.9;
  }

  .end-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(166, 247, 0, 0.4);
    margin-bottom: 20px;
  }

  .title {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 72px;
    font-weight: 700;
    color: #A6F700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 16px;
  }

  .divider {
    width: 180px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #A6F700, transparent);
    margin: 28px 0;
  }

  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.5);
    letter-spacing: 0.1em;
  }

  .tagline {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 20px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.25);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 32px;
  }

  /* Status indicator dot */
  .status {
    position: absolute;
    bottom: 36px;
    right: 52px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #A6F700;
    box-shadow: 0 0 12px rgba(166, 247, 0, 0.5);
  }
  .status-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(166, 247, 0, 0.35);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="border-frame"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="grid-line grid-h grid-h1"></div>
    <div class="grid-line grid-h grid-h2"></div>
    <div class="grid-line grid-v grid-v1"></div>
    <div class="grid-line grid-v grid-v2"></div>

    </svg>

    <div class="end-label">// end of thread</div>
    <div class="title">GUNZscope</div>
    <div class="divider"></div>
    <div class="url">gunzscope.xyz</div>
    <div class="tagline">Multi-chain portfolio intelligence</div>

    <div class="status">
      <div class="status-dot"></div>
      <div class="status-text">Signal active</div>
    </div>
  </div>
</body>
</html>
